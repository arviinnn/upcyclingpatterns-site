<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title id="pageTitle">Message Sent | Upcycling Patterns</title>
    <meta
            id="metaDescription"
            name="description"
            content="Your message has been sent successfully to the Upcycling Patterns project team."
    />

    <meta name="robots" content="noindex, follow" />
    <meta name="googlebot" content="noindex, follow" />

    <meta name="theme-color" content="#2f7a43" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1912" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <meta name="application-name" content="Upcycling Patterns" />
    <meta name="apple-mobile-web-app-title" content="UpCyc" />

    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <link rel="alternate" hreflang="en" href="https://upcyclingpatterns.com/success.html" />
    <link rel="alternate" hreflang="tr" href="https://upcyclingpatterns.com/success.html?lang=tr" />
    <link rel="alternate" hreflang="x-default" href="https://upcyclingpatterns.com/success.html" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Early theme detection (no FOUC) — syncs with main site's siteTheme key -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem("siteTheme");
                var prefersDark = window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches;
                var theme = (saved === "dark" || saved === "light")
                    ? saved
                    : (prefersDark ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
            } catch (e) {
                document.documentElement.setAttribute("data-theme", "light");
            }
        })();
    </script>

    <style>
        :root {
            --primary: #2f7a43;
            --primary-light: #57b26c;
            --accent: #b8ff7a;
            --text-main: #0f1b14;
            --text-soft: #5a6b60;
            --bg-1: #f8fcf8;
            --bg-2: #eef6ef;
            --card: rgba(255, 255, 255, 0.82);
            --border: rgba(47, 122, 67, 0.16);
            --shadow: 0 30px 90px rgba(15, 27, 20, 0.16);
        }

        html[data-theme="dark"] {
            --text-main: #f0f7f1;
            --text-soft: #b8c5bb;
            --bg-1: #0a120d;
            --bg-2: #0f1912;
            --card: rgba(20, 32, 24, 0.84);
            --border: rgba(184, 255, 122, 0.14);
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --text-main: #f0f7f1;
                --text-soft: #b8c5bb;
                --bg-1: #0a120d;
                --bg-2: #0f1912;
                --card: rgba(20, 32, 24, 0.84);
                --border: rgba(184, 255, 122, 0.14);
                --shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
            }
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-main);
            background:
                    radial-gradient(circle at 20% 20%, rgba(87, 178, 108, 0.18), transparent 32%),
                    radial-gradient(circle at 80% 70%, rgba(184, 255, 122, 0.18), transparent 34%),
                    linear-gradient(180deg, var(--bg-1), var(--bg-2));
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html[data-theme="dark"] body {
            background:
                    radial-gradient(circle at 20% 20%, rgba(87, 178, 108, 0.10), transparent 32%),
                    radial-gradient(circle at 80% 70%, rgba(184, 255, 122, 0.08), transparent 34%),
                    linear-gradient(180deg, var(--bg-1), var(--bg-2));
        }

        .lang-switch {
            position: fixed;
            top: 18px;
            right: 18px;
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
        }

        .lang-btn {
            min-width: 38px;
            height: 32px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--text-soft);
            font-size: 0.8rem;
            font-weight: 900;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .lang-btn:hover {
            color: var(--primary);
        }

        .lang-btn.active {
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
        }

        .card {
            width: min(720px, 100%);
            padding: clamp(28px, 6vw, 56px);
            border: 1px solid var(--border);
            border-radius: 34px;
            background: var(--card);
            box-shadow: var(--shadow);
            text-align: center;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
        }

        .icon {
            width: 82px;
            height: 82px;
            display: grid;
            place-items: center;
            margin: 0 auto 22px;
            border-radius: 50%;
            color: white;
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--accent));
            box-shadow: 0 18px 42px rgba(47, 122, 67, 0.28);
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 6vw, 3.4rem);
            line-height: 1.05;
            letter-spacing: -0.02em;
        }

        p {
            margin: 0 auto 28px;
            max-width: 560px;
            color: var(--text-soft);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 12px 20px;
            border-radius: 999px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            background: var(--primary);
            box-shadow: 0 14px 34px rgba(47, 122, 67, 0.22);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(47, 122, 67, 0.32);
        }

        a:focus-visible {
            outline: 3px solid rgba(87, 178, 108, 0.45);
            outline-offset: 3px;
        }

        a.secondary {
            color: var(--primary);
            background: rgba(87, 178, 108, 0.12);
            box-shadow: none;
        }

        a.secondary:hover {
            background: rgba(87, 178, 108, 0.18);
            box-shadow: 0 12px 28px rgba(47, 122, 67, 0.18);
        }

        html[data-theme="dark"] a.secondary {
            color: var(--accent);
            background: rgba(184, 255, 122, 0.10);
        }

        html[data-theme="dark"] a.secondary:hover {
            background: rgba(184, 255, 122, 0.16);
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }

            a:hover {
                transform: none;
            }
        }

        @media print {
            .lang-switch,
            .actions {
                display: none !important;
            }

            .card {
                box-shadow: none !important;
                border: 1px solid #ccc !important;
                background: #fff !important;
            }
        }
    </style>
</head>

<body>
<div class="lang-switch" role="group" aria-label="Language Switcher">
    <button type="button" class="lang-btn active" data-lang="en" aria-pressed="true" aria-label="Switch to English">EN</button>
    <button type="button" class="lang-btn" data-lang="tr" aria-pressed="false" aria-label="Türkçe'ye geç">TR</button>
</div>

<main class="card" role="main">
    <div class="icon" aria-hidden="true">✓</div>
    <h1 id="title">Message Sent</h1>
    <p id="message">
        Thank you for contacting the Upcycling Patterns project team. Your message has been received successfully.
    </p>
    <div class="actions">
        <a href="/" id="backHome">Back to Homepage</a>
        <a class="secondary" href="mailto:upcyclingpatterns@gmail.com" id="anotherEmail">Send Another Email</a>
    </div>
</main>

<script>
    (function () {
        "use strict";

        var SUPPORTED = ["en", "tr"];
        var DEFAULT_LANG = "en";
        var STORAGE_KEY = "siteLanguage";

        var dict = {
            en: {
                pageTitle: "Message Sent | Upcycling Patterns",
                metaDescription: "Your message has been sent successfully to the Upcycling Patterns project team.",
                title: "Message Sent",
                message: "Thank you for contacting the Upcycling Patterns project team. Your message has been received successfully.",
                backHome: "Back to Homepage",
                anotherEmail: "Send Another Email"
            },
            tr: {
                pageTitle: "Mesajınız Gönderildi | Upcycling Patterns",
                metaDescription: "Mesajınız Upcycling Patterns proje ekibine başarıyla gönderildi.",
                title: "Mesajınız Gönderildi",
                message: "Upcycling Patterns proje ekibiyle iletişime geçtiğiniz için teşekkür ederiz. Mesajınız başarıyla alındı.",
                backHome: "Ana Sayfaya Dön",
                anotherEmail: "Başka E-posta Gönder"
            }
        };

        function safeGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
        function safeSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

        function detectLang() {
            try {
                var p = new URLSearchParams(window.location.search).get("lang");
                if (p && SUPPORTED.indexOf(p.toLowerCase()) !== -1) return p.toLowerCase();
            } catch (e) {}
            var s = safeGet(STORAGE_KEY);
            if (s && SUPPORTED.indexOf(s) !== -1) return s;
            var n = ((navigator.language || navigator.userLanguage || "en") + "").toLowerCase();
            return n.indexOf("tr") === 0 ? "tr" : DEFAULT_LANG;
        }

        function setText(id, value) {
            var el = document.getElementById(id);
            if (el && typeof value === "string") el.textContent = value;
        }

        function setMeta(sel, attr, value) {
            var el = document.querySelector(sel);
            if (el && typeof value === "string") el.setAttribute(attr, value);
        }

        function applyLang(lang) {
            var L = SUPPORTED.indexOf(lang) !== -1 ? lang : DEFAULT_LANG;
            var d = dict[L];

            document.documentElement.lang = L;
            document.title = d.pageTitle;

            setMeta('#metaDescription', 'content', d.metaDescription);

            setText("title", d.title);
            setText("message", d.message);
            setText("backHome", d.backHome);
            setText("anotherEmail", d.anotherEmail);

            // If TR, also update the homepage link to keep the user on /tr/
            var backHomeLink = document.getElementById("backHome");
            if (backHomeLink) {
                backHomeLink.setAttribute("href", L === "tr" ? "/tr/" : "/");
            }

            var btns = document.querySelectorAll(".lang-btn");
            for (var i = 0; i < btns.length; i++) {
                var active = btns[i].getAttribute("data-lang") === L;
                btns[i].classList.toggle("active", active);
                btns[i].setAttribute("aria-pressed", active ? "true" : "false");
            }

            safeSet(STORAGE_KEY, L);
        }

        function bind() {
            var btns = document.querySelectorAll(".lang-btn");
            for (var i = 0; i < btns.length; i++) {
                (function (btn) {
                    btn.addEventListener("click", function () {
                        applyLang(btn.getAttribute("data-lang"));
                    });
                })(btns[i]);
            }

            window.addEventListener("storage", function (e) {
                if (e.key === STORAGE_KEY && e.newValue && SUPPORTED.indexOf(e.newValue) !== -1) {
                    applyLang(e.newValue);
                }
                if (e.key === "siteTheme" && (e.newValue === "dark" || e.newValue === "light")) {
                    document.documentElement.setAttribute("data-theme", e.newValue);
                }
            });
        }

        function init() {
            applyLang(detectLang());
            bind();
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init, { once: true });
        } else {
            init();
        }
    })();
</script>
</body>
</html>
