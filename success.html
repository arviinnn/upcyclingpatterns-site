<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Message Sent | Upcycling Patterns</title>
  <meta name="description" content="Your message has been sent successfully to the Upcycling Patterns project team." />
  <meta name="robots" content="noindex, follow" />

  <meta name="theme-color" content="#2f7a43" />
  <meta name="color-scheme" content="light dark" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <style>
    :root {
      --primary: #2f7a43;
      --primary-light: #57b26c;
      --accent: #b8ff7a;
      --text-main: #0f1b14;
      --text-soft: #5a6b60;
      --bg-1: #f8fcf8;
      --bg-2: #eef6ef;
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(47, 122, 67, 0.16);
      --shadow: 0 30px 90px rgba(15, 27, 20, 0.16);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-main: #f0f7f1;
        --text-soft: #b8c5bb;
        --bg-1: #0a120d;
        --bg-2: #0f1912;
        --card: rgba(20, 32, 24, 0.84);
        --border: rgba(184, 255, 122, 0.14);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(87, 178, 108, 0.18), transparent 32%),
        radial-gradient(circle at 80% 70%, rgba(184, 255, 122, 0.18), transparent 34%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .card {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--border);
      border-radius: 34px;
      background: var(--card);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .icon {
      width: 82px;
      height: 82px;
      display: grid;
      place-items: center;
      margin: 0 auto 22px;
      border-radius: 50%;
      color: white;
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--accent));
      box-shadow: 0 18px 42px rgba(47, 122, 67, 0.28);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.05;
    }

    p {
      margin: 0 auto 28px;
      max-width: 560px;
      color: var(--text-soft);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 800;
      color: white;
      text-decoration: none;
      background: var(--primary);
      box-shadow: 0 14px 34px rgba(47, 122, 67, 0.22);
    }

    a.secondary {
      color: var(--primary);
      background: rgba(87, 178, 108, 0.12);
      box-shadow: none;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon" aria-hidden="true">✓</div>
    <h1>Message Sent</h1>
    <p>
      Thank you for contacting the Upcycling Patterns project team. Your message has been received successfully.
    </p>

    <div class="actions">
      <a href="/">Back to Homepage</a>
      <a class="secondary" href="mailto:upcyclingpatterns@gmail.com">Send Another Email</a>
    </div>
  </main>
</body>
</html>
