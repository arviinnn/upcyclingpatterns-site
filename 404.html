<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>404 | Upcycling Patterns</title>

    <meta name="robots" content="noindex, follow" />

    <style>
        :root {
            --primary: #2f7a43;
            --primary-light: #57b26c;
            --accent: #b8ff7a;
            --text-main: #0f1b14;
            --text-soft: #5a6b60;
            --bg-1: #f8fcf8;
            --bg-2: #eef6ef;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            color: var(--text-main);
            background:
                    radial-gradient(circle at top left, rgba(87, 178, 108, 0.16), transparent 28%),
                    radial-gradient(circle at top right, rgba(184, 255, 122, 0.18), transparent 26%),
                    linear-gradient(180deg, var(--bg-1), var(--bg-2));
        }

        .card {
            width: min(100%, 720px);
            padding: 42px 32px;
            text-align: center;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 24px 70px rgba(15, 27, 20, 0.12);
            backdrop-filter: blur(18px);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            padding: 9px 15px;
            border-radius: 999px;
            color: var(--primary);
            background: rgba(87, 178, 108, 0.12);
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            line-height: 1;
            margin-bottom: 12px;
            color: var(--primary);
        }

        h2 {
            font-size: clamp(1.5rem, 4vw, 2.4rem);
            margin-bottom: 14px;
        }

        p {
            color: var(--text-soft);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 26px;
        }

        a {
            min-height: 54px;
            padding: 0 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 18px 40px rgba(47, 122, 67, 0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 24px 55px rgba(47, 122, 67, 0.34);
        }
    </style>
</head>

<body>
<main class="card">
    <div class="badge">Upcycling Patterns</div>

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
        The page you are looking for may have been moved, deleted, or the address may be incorrect.
        You can return to the homepage and continue exploring the project.
    </p>

    <a href="/">Back to Homepage</a>
</main>
</body>
</html>
